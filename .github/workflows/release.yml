# Memex Release 流水线
#
# 触发方式（二选一）：
#   1. push tag → 正式发版，自动创建 GitHub Release 草稿（永久产物）
#      git tag -a v0.2.1 -m "Release v0.2.1" && git push origin v0.2.1
#   2. workflow_dispatch → 日常调试，只产 Artifact（30 天保留，不创建 Release）
#      GitHub → Actions → "Release" → "Run workflow"
#
# 产物去向：
#   - tag 触发  → GitHub Releases 页（草稿，需手动 Publish）
#   - 手动触发 → 只有 Artifact（在对应 run 的 Summary 页下载）
#
# 平台矩阵：
#   - macOS Apple Silicon (.dmg)   ← 仅此一个，2026-06-02 决策
#
# 为什么不支持 macOS Intel：
#   - 个人项目，没人在 Intel Mac 上跑过，没有真实用户反馈渠道
#   - Apple 已停售 Intel Mac 多年，新用户基本是 M-series
#   - 维护 Intel runner 会让 GHA 跑两倍时长 + 多一份 sidecar 编译
#   - 如未来真有 Intel 用户请反馈，恢复成本约 10 行 yaml
#
# 已知限制（首版未做）：
#   - 未做 Apple Developer ID 签名 + Notarization → 首次打开需 xattr 解除 quarantine
#   - 未集成 tauri-plugin-updater（2026-06-02 永久决策）→ 用户自行在 Releases 页下载
#     App 内 Settings → 关于 → 检查更新 会拉 GitHub API 比对版本

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    # 手动触发不需要输入版本号；产物按 commit sha 区分

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # M1 runner，唯一目标平台
            args: "--target aarch64-apple-darwin --bundles app,dmg"
            label: aarch64
            rust_target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/desktop/package-lock.json

      - name: Install Rust stable with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app -> target"
          key: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        working-directory: app/desktop
        run: npm ci

      # 仅 tag 触发时同步版本号 — 把 v0.2.1 写入 Cargo.toml / package.json / tauri.conf.json / Casks/memex.rb
      # 这样 tauri-action 后续生成的 bundle 文件名会带上正确版本号
      # workflow_dispatch 跳过：保留 manifest 里的现有版本号，用 commit sha 区分产物
      - name: Sync version across all manifest files (tag trigger only)
        if: github.event_name == 'push'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node scripts/sync-version.js "$VERSION"
          echo "synced version: $VERSION"

      # tag 触发分支：tauri-action 自带 Release 草稿创建逻辑
      - name: Build & publish to GitHub Release (tag trigger)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 告诉 prepare-sidecars.mjs 用哪个 target triple 作为 binary 后缀名
          # （memex-aarch64-apple-darwin / memex-daemon-aarch64-apple-darwin）
          # Tauri externalBin 通过这个 suffix 在 bundle 时找对应 sidecar
          MEMEX_BUILD_TARGET: ${{ matrix.rust_target }}
        with:
          projectPath: app/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Memex ${{ github.ref_name }}"
          releaseBody: |
            ## Memex — Local-first AI Session Memory

            > 本地优先的跨 LLM 会话记忆中心 — macOS Apple Silicon (M1/M2/M3/M4)

            ### 平台支持

            - macOS Apple Silicon (`Memex_*_aarch64.dmg`)

            > 当前不提供 Intel Mac 构建。Intel 用户如有需要请提 Issue。

            ### 首次安装

            1. 下载 `.dmg`
            2. 打开 DMG，拖 **Memex** 到 **Applications**
            3. 本版本**未做 Apple Developer ID 签名 + Notarization**，首次启动会被 Gatekeeper 拦截。在终端执行一次即可：

               ```bash
               sudo xattr -cr /Applications/Memex.app
               ```

               或右键点 `.app` → "打开" → 在警告框中再点"打开"。
            4. 启动后菜单栏右上角会出现 **M** 图标

            ### SHA256 校验

            下载后本地校验：

            ```bash
            shasum -a 256 Memex_*_*.dmg
            ```

            完整 hash 在 [app/Casks/memex.rb](https://github.com/shetengteng/memex/blob/main/app/Casks/memex.rb) 里。

            ### 完整变更日志

            参见仓库 [设计文档目录](https://github.com/shetengteng/memex/tree/main/design)。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 手动触发分支：只构建不创建 Release
      - name: Build only (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEMEX_BUILD_TARGET: ${{ matrix.rust_target }}
        with:
          projectPath: app/desktop
          args: ${{ matrix.args }}

      # 手动触发时把产物上传成 Artifact
      - name: Upload artifacts (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: memex-${{ matrix.label }}-${{ github.sha }}
          path: |
            app/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            app/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn
          retention-days: 30
