name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14 # M1 runner
            arch: aarch64
          - target: x86_64-apple-darwin
            os: macos-13 # Intel runner
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: tauri-app
        run: npm ci

      - name: Build Tauri bundle (signed + DMG)
        working-directory: tauri-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 让 prepare-sidecars.mjs 走 cross target 编译 memex / memex-daemon
          # 与 tauri build --target 保持一致，避免在 x86_64 runner 上误打入 host arm64 sidecar
          MEMEX_BUILD_TARGET: ${{ matrix.target }}
        run: npx tauri build --target ${{ matrix.target }} --bundles app,dmg
        # 没有 Apple Developer 证书时跳过 notarization；signingIdentity="-" 走 ad-hoc

      - name: Rename DMG with arch suffix
        run: |
          DMG_SRC=$(ls target/${{ matrix.target }}/release/bundle/dmg/Memex_*.dmg | head -1)
          DMG_DST="target/${{ matrix.target }}/release/bundle/dmg/Memex_${{ github.ref_name }}_${{ matrix.arch }}.dmg"
          if [ "$DMG_SRC" != "$DMG_DST" ]; then
            mv "$DMG_SRC" "$DMG_DST" || true
          fi
          echo "DMG_PATH=$DMG_DST" >> $GITHUB_ENV

      - name: Sign updater artifact (.app.tar.gz)
        run: |
          # tauri build 会在 createUpdaterArtifacts=true 时自动生成 .sig
          # 这里只做产物路径输出
          SIG_PATH=$(ls target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig | head -1 || true)
          TARGZ_PATH=$(ls target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz | head -1 || true)
          echo "SIG_PATH=$SIG_PATH" >> $GITHUB_ENV
          echo "TARGZ_PATH=$TARGZ_PATH" >> $GITHUB_ENV

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memex-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Layout files
        id: layout
        run: |
          mkdir -p release-assets
          # DMG（两个架构）
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          # updater 产物（两个架构）
          find artifacts -name "*.app.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -name "*.app.tar.gz.sig" -exec cp {} release-assets/ \;
          ls -la release-assets/
          # 把 tag 取出来供 latest.json 生成使用
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ]; then TAG="${{ inputs.tag }}"; fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${{ steps.layout.outputs.version }}"
          TAG="${{ steps.layout.outputs.tag }}"
          ARM_SIG=$(cat release-assets/*aarch64*.app.tar.gz.sig 2>/dev/null | head -c -1 || echo "")
          X64_SIG=$(cat release-assets/*x64*.app.tar.gz.sig 2>/dev/null | head -c -1 || echo "")
          ARM_TGZ_NAME=$(ls release-assets/*aarch64*.app.tar.gz 2>/dev/null | head -1 | xargs basename)
          X64_TGZ_NAME=$(ls release-assets/*x64*.app.tar.gz 2>/dev/null | head -1 | xargs basename)

          cat > release-assets/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/$TAG for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$ARM_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/$ARM_TGZ_NAME"
              },
              "darwin-x86_64": {
                "signature": "$X64_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/$X64_TGZ_NAME"
              }
            }
          }
          EOF
          cat release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.layout.outputs.tag }}
          name: ${{ steps.layout.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: false
