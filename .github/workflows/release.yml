name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14 # M1 runner
            arch: aarch64
          - target: x86_64-apple-darwin
            os: macos-13 # Intel runner
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: tauri-app
        run: npm ci

      - name: Build Tauri bundle (.app + .dmg)
        working-directory: tauri-app
        env:
          # 让 prepare-sidecars.mjs 走 cross target 编译 memex / memex-daemon
          # 与 tauri build --target 保持一致，避免在 x86_64 runner 上误打入 host arm64 sidecar
          MEMEX_BUILD_TARGET: ${{ matrix.target }}
        run: npx tauri build --target ${{ matrix.target }} --bundles app,dmg
        # signingIdentity="-" 走 ad-hoc 签名，不需要 Apple Developer 证书
        # 不使用 Tauri Updater，所以也不需要 TAURI_SIGNING_PRIVATE_KEY secret

      - name: Rename DMG with arch suffix
        run: |
          DMG_SRC=$(ls target/${{ matrix.target }}/release/bundle/dmg/Memex_*.dmg | head -1)
          DMG_DST="target/${{ matrix.target }}/release/bundle/dmg/Memex_${{ github.ref_name }}_${{ matrix.arch }}.dmg"
          if [ "$DMG_SRC" != "$DMG_DST" ]; then
            mv "$DMG_SRC" "$DMG_DST"
          fi

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memex-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets + compute SHA256
        id: assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          ls -la release-assets/

          ARM_DMG=$(ls release-assets/Memex_*_aarch64.dmg 2>/dev/null | head -1 || true)
          X64_DMG=$(ls release-assets/Memex_*_x64.dmg 2>/dev/null | head -1 || true)

          ARM_SHA=""
          X64_SHA=""
          [ -n "$ARM_DMG" ] && ARM_SHA=$(shasum -a 256 "$ARM_DMG" | awk '{print $1}')
          [ -n "$X64_DMG" ] && X64_SHA=$(shasum -a 256 "$X64_DMG" | awk '{print $1}')

          echo "arm_dmg=$(basename "$ARM_DMG")" >> "$GITHUB_OUTPUT"
          echo "x64_dmg=$(basename "$X64_DMG")" >> "$GITHUB_OUTPUT"
          echo "arm_sha=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "x64_sha=$X64_SHA" >> "$GITHUB_OUTPUT"

      - name: Compose release body
        id: body
        env:
          ARM_DMG: ${{ steps.assets.outputs.arm_dmg }}
          X64_DMG: ${{ steps.assets.outputs.x64_dmg }}
          ARM_SHA: ${{ steps.assets.outputs.arm_sha }}
          X64_SHA: ${{ steps.assets.outputs.x64_sha }}
          TAG: ${{ github.ref_name || inputs.tag }}
        run: |
          VERSION=${TAG#v}
          cat > release-body.md <<EOF
          ## 📦 安装方式 / Install

          ### 方式 1：下载 DMG（推荐）

          | 架构 / Arch | 文件 / File |
          |---|---|
          | Apple Silicon (M1/M2/M3/M4) | \`${ARM_DMG}\` |
          | Intel Mac | \`${X64_DMG}\` |

          1. 在下方 Assets 区下载对应 DMG
          2. 打开 DMG，把 **Memex** 拖到 **Applications**
          3. 首次启动如提示「已损坏」或「无法验证开发者」，在终端运行：

             \`\`\`bash
             sudo xattr -cr /Applications/Memex.app
             \`\`\`

          4. 启动后菜单栏右上角会出现 Memex 图标

          ### 方式 2：Homebrew Cask（即将上线）

          \`\`\`bash
          brew tap shetengteng/memex
          brew install --cask memex
          \`\`\`

          > Cask repo 尚未发布，先用方式 1。

          ### 方式 3：源码构建

          \`\`\`bash
          git clone https://github.com/shetengteng/memex
          cd memex
          bash scripts/upgrade-local.sh    # 编译 + 安装到 /Applications，自动备份 ~/.memex
          \`\`\`

          ## 🔐 SHA256 校验

          \`\`\`
          ${ARM_SHA}  ${ARM_DMG}
          ${X64_SHA}  ${X64_DMG}
          \`\`\`

          下载后本地校验：

          \`\`\`bash
          shasum -a 256 Memex_${VERSION}_*.dmg
          \`\`\`

          ## 🆙 检查更新

          App 内 **Settings → 关于 → 检查更新** 会跳转到本页面。

          ---
          EOF
          echo "---- release body ----"
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          body_path: release-body.md
          append_body: true
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
