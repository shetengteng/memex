<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex — AI Session Memory</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span>M</span>EMEX</h1>
      <p>AI Session Memory</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">&#9632;</span> Dashboard
      </div>
      <div class="nav-item" data-page="sessions">
        <span class="nav-icon">&#9776;</span> Sessions
      </div>
      <div class="nav-item" data-page="search">
        <span class="nav-icon">&#128269;</span> Search
      </div>
    </div>
    <div class="sidebar-footer">
      Memex v0.1.0 &middot; Local Only
    </div>
  </div>

  <div class="main">
    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
      <h1 class="page-title">Dashboard</h1>
      <div class="cards" id="stats-cards"></div>
      <div class="chart-container">
        <div class="chart-title">Daily Activity (last 30 days)</div>
        <div class="bar-chart" id="timeline-chart"></div>
      </div>
      <div class="pie-row" id="breakdown-row"></div>
    </div>

    <!-- Sessions -->
    <div class="page" id="page-sessions">
      <h1 class="page-title">Sessions</h1>
      <div class="toolbar">
        <input type="search" class="search-box" id="sessions-search"
          placeholder="Filter by project, source, ID..."
          style="flex:1;min-width:200px" oninput="filterSessions()">
        <select class="filter-select" id="sessions-source-filter" onchange="filterSessions()">
          <option value="">All Sources</option>
          <option value="claude_code">Claude Code</option>
          <option value="cursor">Cursor</option>
          <option value="codex">Codex</option>
          <option value="opencode">OpenCode</option>
          <option value="aider">Aider</option>
          <option value="continue_dev">Continue</option>
          <option value="cline">Cline</option>
        </select>
        <select class="filter-select" id="sessions-limit" onchange="loadSessions()">
          <option value="50">50 per page</option>
          <option value="100">100 per page</option>
          <option value="200">200 per page</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="loadSessions()">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Source</th>
              <th>Project</th>
              <th>Messages</th>
              <th>Updated</th>
              <th>Session ID</th>
            </tr>
          </thead>
          <tbody id="sessions-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="sessions-pagination"></div>
    </div>

    <!-- Session Detail -->
    <div class="page" id="page-session-detail">
      <div class="detail-back" onclick="showPage('sessions')">&larr; Back to sessions</div>
      <div id="session-detail-content"></div>
    </div>

    <!-- Search -->
    <div class="page" id="page-search">
      <h1 class="page-title">Search</h1>
      <div class="toolbar">
        <input type="search" class="search-box" id="search-input"
          placeholder="Search across all sessions..."
          style="flex:1;min-width:200px" onkeydown="if(event.key==='Enter')doSearch()">
        <select class="filter-select" id="search-adapter">
          <option value="">All Sources</option>
          <option value="claude_code">Claude Code</option>
          <option value="cursor">Cursor</option>
          <option value="codex">Codex</option>
          <option value="opencode">OpenCode</option>
          <option value="aider">Aider</option>
          <option value="continue_dev">Continue</option>
          <option value="cline">Cline</option>
        </select>
        <input type="text" class="search-box" id="search-project"
          placeholder="Project filter..." style="flex:0.4;min-width:120px">
        <button class="btn" onclick="doSearch()">Search</button>
      </div>
      <div id="search-results">
        <div class="empty">Enter a query and press Enter to search across all sessions</div>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
