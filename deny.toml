# cargo-deny configuration.
#
# Layered defense alongside cargo-audit (advisory DB) and cargo-machete (unused deps).
# Run locally / in CI with: cargo deny --all-features check
#
# Schema reference: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

# -----------------------------------------------------------------------------
# Advisories: RustSec advisory database (https://rustsec.org).
# Layered with `cargo audit` (which is advisory-only). Keeps yanked detection in.
# -----------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# All ignores below are transitive deps pulled in by tauri 2.x and its plugin
# chain (gtk-rs, urlpattern → unic-*, proc-macro-error). We cannot upgrade
# these without waiting for upstream tauri/wry to migrate. Revisit on every
# tauri minor bump and prune anything that has dropped out of the dep graph.
ignore = [
    # gtk-rs GTK3 bindings — unmaintained, pulled in by tauri-runtime-wry on Linux.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # `instant` — unmaintained, transitive via parking_lot/glib in tauri runtime.
    "RUSTSEC-2024-0384",
    # `proc-macro-error` — unmaintained, transitive via tauri-macros chain.
    "RUSTSEC-2024-0370",
    # `unic-*` family — unmaintained, transitive via urlpattern → tauri-utils.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]

# -----------------------------------------------------------------------------
# Licenses: workspace itself is MIT. Allowlist permissive + weak-copyleft only.
# Reject GPL / AGPL family outright.
# -----------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# -----------------------------------------------------------------------------
# Bans: catch accidental duplicates and known-bad crates.
# -----------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

# -----------------------------------------------------------------------------
# Sources: only crates.io and the project's own git deps (none currently).
# -----------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
