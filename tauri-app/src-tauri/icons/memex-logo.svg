    <line x1="180" y1="80" x2="260" y2="60"/>
    <line x1="260" y1="60" x2="350" y2="60"/>
    <line x1="350" y1="60" x2="420" y2="100"/>
    <line x1="90" y1="90" x2="100" y2="200"/>
    <line x1="100" y1="200" x2="80" y2="380"/>
    <line x1="80" y1="380" x2="160" y2="440"/>
    <line x1="420" y1="100" x2="430" y2="220"/>
    <line x1="430" y1="220" x2="420" y2="420"/>
