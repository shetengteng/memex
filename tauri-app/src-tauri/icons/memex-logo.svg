<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="mFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <g opacity="0.18" fill="#38bdf8">
    <circle cx="90" cy="90" r="8"/>
    <circle cx="180" cy="80" r="6"/>
    <circle cx="420" cy="100" r="7"/>
    <circle cx="100" cy="200" r="5"/>
    <circle cx="430" cy="220" r="6"/>
    <circle cx="80" cy="380" r="6"/>
    <circle cx="420" cy="420" r="7"/>
    <circle cx="160" cy="440" r="5"/>
    <circle cx="350" cy="60" r="4"/>
    <circle cx="260" cy="60" r="5"/>
  </g>

  <g opacity="0.12" stroke="#38bdf8" stroke-width="1" fill="none">
